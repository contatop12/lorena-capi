# Cloudflare Worker — replicação por cliente: altere apenas variáveis / secrets.
# Mapeamento .env ↔ Wrangler: directives/config_ambiente.md
# Contrato JSON: directives/contrato_payload_capi.md
# Chaves espelhadas em: .env.example e .dev.vars.example
# [vars] típicas: PIXEL_ID, META_API_VERSION, ALLOWED_ORIGINS, WORKER_ENV,
#   TEST_EVENT_CODE, EXPOSE_META_ERRORS, WORKER_EVENT_URL
#
# Segredo (não commitar valor real):
#   npx wrangler secret put META_ACCESS_TOKEN
# Se der erro 10053 "already in use": apague META_ACCESS_TOKEN em Variables
#   como TEXTO PLANO no Dashboard e crie de novo como Secret (ver directives/config_segredos.md).
#
# Desenvolvimento local: copie .dev.vars.example para .dev.vars e preencha.

name = "conversao-api-meta"
main = "worker.js"
compatibility_date = "2024-10-01"

# Mantém URL *.workers.dev (alinhado ao que costuma estar ativo no Dashboard).
workers_dev = true
preview_urls = true

# Domínios customizados (tracking + validação) no mesmo Worker.
routes = [
  { pattern = "track.lcoadv.com.br", zone_name = "lcoadv.com.br", custom_domain = true },
  { pattern = "validacao.lcoadv.com.br", zone_name = "lcoadv.com.br", custom_domain = true },
]

# Observabilidade — mesma estrutura em todas as implantações (Wrangler / Git / CI).
# Documentação: https://developers.cloudflare.com/workers/wrangler/configuration/#observability
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = false
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# Variáveis públicas de configuração (por cliente / ambiente)
# Cliente ativo: Lorena / LCOAdv — ver directives/cliente_lorena_lcoadv.md
[vars]
PIXEL_ID = "993975279878737"
META_API_VERSION = "v21.0"
# Produção: lista explícita. Adicione https://lcoadv.com.br se o site responder sem www.
ALLOWED_ORIGINS = "https://www.lcoadv.com.br"
# production = CORS estrito; development = permite * ou vazio em ALLOWED_ORIGINS
WORKER_ENV = "production"
# Test Events (Meta Events Manager) — Lorena / LCOAdv. Remova ou esvazie após validar.
TEST_EVENT_CODE = "TEST7356"
# Retornar detalhes da Meta em erros HTTP (desligado em produção por omissão)
EXPOSE_META_ERRORS = "false"
# Referência de endpoint público (espelho do .env)
WORKER_EVENT_URL = "https://track.lcoadv.com.br/event"


# Painel de monitoramento: GET /dashboard (mesmo host do Worker)
# MONITOR_TOKEN — secret recomendado (produção). Em WORKER_ENV=development pode ficar vazio.
#   wrangler secret put MONITOR_TOKEN
# EVENT_LOG — KV para histórico entre invocações (dashboard / monitor).
[[kv_namespaces]]
binding = "EVENT_LOG"
id = "4a3ae654039547a5b5e7a444bb654355"

# META_ACCESS_TOKEN deve ser configurado via Dashboard ou:
#   wrangler secret put META_ACCESS_TOKEN
